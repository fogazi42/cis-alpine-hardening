name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: lint
        run: |
          set -e
          find . -type f -name '*.sh' -print0 \
            | xargs -0 shellcheck -s sh -S warning
